<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthApp AI | Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>

<body>
    <div class="sidebar">
        <h3 class="text-white text-center mb-4">Health AI</h3>
        <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
            🏠 Dashboard
        </a>

        <a href="{{ url_for('upload_file') }}" class="{% if request.endpoint == 'upload_file' %}active{% endif %}">
            📂 Upload Files
        </a>

        <a href="{{ url_for('ask') }}" class="{% if request.endpoint == 'ask' %}active{% endif %}">
            💬 Ask AI Assistant
        </a>

        <a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}">
            🕒 Query History
        </a>
        <hr class="text-secondary">
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
